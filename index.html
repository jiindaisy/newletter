<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>뉴스 브리핑</title>
<style>
:root{
  --bg:#fff4f8;
  --paper:#ffffff;
  --line:#f2c7d8;
  --text:#3a2a31;
  --muted:#8a6b78;
  --main:#d63384;
  --soft:#fde8f1;
}

body{
  background:var(--bg);
  font-family:Arial;
  margin:0;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid var(--line);
}

.btn{
  padding:10px;
  background:var(--main);
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>💗 사회적경제 뉴스</h2>

<button class="btn" onclick="loadNews()">뉴스 불러오기</button>

<div id="news"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyxzBpKyZK-u1dEtAQr-0DeDdBbSGZw1_I-jtQ7XDNf3C9F6w7yNKr8Ootq7C3RMmCvgw/exec";

async function loadNews(){
  const res = await fetch(API_URL);
  const data = await res.json();

  const div = document.getElementById("news");
  div.innerHTML="";

  data.news.slice(-20).reverse().forEach(n=>{
    div.innerHTML += `
      <div class="card">
        <b>${n.title}</b><br>
        <small>${n.source} | ${n.batchDate}</small><br>
        <a href="${n.link}" target="_blank">기사보기</a>
      </div>
    `;
  });
}
</script>

</body>
</html>
