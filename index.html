<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxAjNW9t3tYxXRhkuqwX4g4-8tghwv2UcrW6qK9_aH5fkMnNU3gQg94OwpPChzYgvvzUQ/exec";

let allNews = [];
let currentKeyword = "전체";

const FIXED_KEYWORDS = [
  "전체","비영리","ESG","스타트업","청년"
];

async function loadNews() {
  const res = await fetch(API_URL + "?t=" + Date.now());
  const data = await res.json();

  allNews = data.news;
  render();
}

function getKeywordCounts() {
  const counts = {};
  allNews.forEach(n => {
    counts[n.keyword] = (counts[n.keyword] || 0) + 1;
  });
  return counts;
}

function render() {
  const counts = getKeywordCounts();

  const keywordDiv = document.getElementById("keywords");
  keywordDiv.innerHTML = "";

  FIXED_KEYWORDS.forEach(k => {
    const count = counts[k] || 0;

    const btn = document.createElement("button");
    btn.innerText = `${k}(${count})`;

    btn.onclick = () => {
      currentKeyword = k;
      renderNews();
    };

    keywordDiv.appendChild(btn);
  });

  renderNews();
}

function renderNews() {
  const div = document.getElementById("news");
  div.innerHTML = "";

  let list = allNews;

  if (currentKeyword !== "전체") {
    list = list.filter(n => n.keyword === currentKeyword);
  }

  list.forEach(n => {
    const el = document.createElement("div");
    el.innerHTML = `<a href="${n.link}" target="_blank">${n.title}</a>`;
    div.appendChild(el);
  });
}

loadNews();
</script>

<div id="keywords"></div>
<div id="news"></div>
